<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Painel de Edição - Filomena</title>
  </head>
  <body>
    <!-- Limpa qualquer resquício do Netlify Identity salvo no navegador -->
    <script>
      Object.keys(localStorage).forEach(key => {
        if (key.includes('netlify') || key.includes('gotrue')) {
          localStorage.removeItem(key);
        }
      });
    <!-- Script principal do Sveltia CMS -->
    <script src="https://unpkg.com/@sveltia/cms/dist/sveltia-cms.js"></script>
  </body>
</html>
